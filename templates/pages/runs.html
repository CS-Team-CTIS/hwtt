{% extends "layout.html" %}

{% block title %}Test Runs - Hamburg Wheel Tracking{% endblock %}

{% block content %}
<div id="main" class="space-y-6">
  <!-- Header -->
  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-bold text-primary">Test Runs</h1>
    <div class="flex items-center space-x-4">
      <div id="htmx-indicator" class="hidden">
        <svg class="animate-spin h-5 w-5 text-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
      <a href="/new-test" class="bg-accent text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-accent-dark transition-colors duration-200 shadow-sm inline-flex items-center">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        New Test Run
      </a>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
    <h2 class="text-lg font-semibold text-primary mb-4">Filters</h2>
    <form id="filter-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
      <!-- Date From -->
      <div>
        <label for="date-from" class="block text-sm font-medium text-gray-700 mb-1">Date From</label>
        <input type="date" id="date-from" name="date_from" value="{{ filters.date_from }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary" />
      </div>

      <!-- Date To -->
      <div>
        <label for="date-to" class="block text-sm font-medium text-gray-700 mb-1">Date To</label>
        <input type="date" id="date-to" name="date_to" value="{{ filters.date_to }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary" />
      </div>

      <!-- Binder Grade -->
      <div>
        <label for="filter-binder" class="block text-sm font-medium text-gray-700 mb-1">Binder Grade</label>
        <select id="filter-binder" name="binder_grade" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">All Grades</option>
          {% for grade in binder_grades %}
          <option value="{{ grade.pk }}" {% if filters.binder_grade == grade.pk|stringformat:"s" %}selected{% endif %}>{{ grade.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- File Type -->
      <div>
        <label for="filter-file-type" class="block text-sm font-medium text-gray-700 mb-1">File Type</label>
        <select id="filter-file-type" name="file_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">All Types</option>
          <option value="1" {% if filters.file_type == "1" %}selected{% endif %}>Instratek</option>
          <option value="2" {% if filters.file_type == "2" %}selected{% endif %}>Troxler</option>
          <option value="3" {% if filters.file_type == "3" %}selected{% endif %}>PTI</option>
          <option value="4" {% if filters.file_type == "4" %}selected{% endif %}>Custom</option>
        </select>
      </div>

      <!-- Status -->
      <div>
        <label for="filter-status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select id="filter-status" name="status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">All Statuses</option>
          <option value="1" {% if filters.status == "1" %}selected{% endif %}>Pending</option>
          <option value="2" {% if filters.status == "2" %}selected{% endif %}>Running</option>
          <option value="3" {% if filters.status == "3" %}selected{% endif %}>Completed</option>
          <option value="4" {% if filters.status == "4" %}selected{% endif %}>Failed</option>
        </select>
      </div>

      <!-- Classification -->
      <div>
        <label for="filter-classification" class="block text-sm font-medium text-gray-700 mb-1">Classification</label>
        <select id="filter-classification" name="classification" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">All Classifications</option>
          <option value="1" {% if filters.classification == "1" %}selected{% endif %}>Excellent</option>
          <option value="2" {% if filters.classification == "2" %}selected{% endif %}>Good</option>
          <option value="3" {% if filters.classification == "3" %}selected{% endif %}>Fair</option>
          <option value="4" {% if filters.classification == "4" %}selected{% endif %}>Poor</option>
        </select>
      </div>

      <!-- Action Buttons -->
      <div class="md:col-span-2 lg:col-span-4 flex items-end space-x-3">
        <button
          type="button"
          hx-get="/runs/?partial=table"
          hx-target="#runs-table"
          hx-swap="outerHTML"
          hx-indicator="#htmx-indicator"
          hx-include="#filter-form"
          class="bg-primary text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-primary-dark transition-colors duration-200 shadow-sm">
          Apply Filters
        </button>
        <a href="/runs/"
          class="bg-white text-gray-700 px-6 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:bg-gray-50 transition-colors duration-200">
          Clear
        </a>
      </div>
    </form>
  </div>

  <!-- Runs Table -->
  {% include 'partials/runs_table.html' %}

  <!-- Toast notification area -->
  <div id="toast" class="fixed top-4 right-4 z-50 space-y-2"></div>
</div>
{% endblock %}
