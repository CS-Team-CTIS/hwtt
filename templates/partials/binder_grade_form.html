<form hx-post="{% if grade %}{% url 'core:binder_grade_edit' pk=grade.pk %}{% else %}{% url 'core:binder_grade_create' %}{% endif %}" hx-target="#binder-grades-tbody" hx-swap="innerHTML" class="flex gap-3 items-end p-4 bg-gray-50 rounded-lg border border-gray-200">
  {% csrf_token %}
  <div class="flex-1">
    <label class="block text-xs font-medium text-gray-700 mb-1">Grade Name</label>
    <input
      type="text"
      name="name"
      value="{{ grade.name|default:'' }}"
      placeholder="e.g. PG 64-22"
      autofocus
      required
      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary" />
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-700 mb-1">Default Max Rut (mm)</label>
    <input
      type="number"
      name="max_rut"
      value="{{ grade.max_rut|default:'' }}"
      placeholder="12.5"
      step="0.1"
      min="0"
      class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary" />
  </div>
  <div>
    <label class="block text-xs font-medium text-gray-700 mb-1">Passes to Rut</label>
    <input
      type="number"
      name="passes_to_rut"
      value="{{ grade.passes_to_rut|default:'' }}"
      placeholder="e.g. 10000"
      min="0"
      step="1"
      class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary" />
  </div>
  <button type="submit" class="bg-accent text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity">
    Save
  </button>
  <button
    type="button"
    onclick="document.getElementById('binder-grade-form').replaceChildren()"
    class="bg-white text-gray-600 px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:bg-gray-50 transition-colors">
    Cancel
  </button>
</form>
